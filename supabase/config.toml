# Supabase project configuration (versioned).
# project_id is the linked project ref (zapable / dikfnpcmutnqrndnyzga).
project_id = "dikfnpcmutnqrndnyzga"

# =============================================================================
# Edge Functions — explicit JWT gating (SECURITY)
# =============================================================================
# `verify_jwt = true` makes the Supabase gateway reject any request that does
# not carry a valid project-issued JWT *before* the function code runs — a free
# layer of defense in front of the function's own checks. Only the Stripe
# webhook may disable it, because Stripe authenticates with a stripe-signature
# header (verified inside the function), not a Supabase JWT.

# Browser-invoked by a logged-in lojista; supabase-js attaches the user access
# token automatically. The function additionally enforces store membership.
[functions.stripe-checkout-session]
verify_jwt = true

[functions.stripe-portal-session]
verify_jwt = true

[functions.ai-instagram-profile]
verify_jwt = true

# Called right after sign-in; carries the new user's JWT (requireAuth()).
[functions.signup-notification]
verify_jwt = true

# Destructive ops endpoint. Gateway requires a valid project JWT (e.g. a
# service-role token) AND the function requires a matching x-admin-token.
# Do NOT loosen this to false — the static token must never be the only control.
[functions.delete-user-by-email]
verify_jwt = true

# Stripe → Supabase sync. MUST be false: Stripe does not send a Supabase JWT.
# Authenticity is enforced by Stripe signature verification inside the function
# (stripe.webhooks.constructEventAsync). Never set this to true.
[functions.stripe-webhook]
verify_jwt = false

# Admin billing alerts (trial ended / subscription events). Invoked server-to-
# server by stripe-webhook and check-trial-completions using the service-role
# key, which is a valid project JWT — so the gateway gates anonymous callers.
[functions.billing-notification]
verify_jwt = true

# Daily trial-completion sweep. MUST be false: the cron caller does not send a
# Supabase JWT. Authenticity is enforced inside the function via the x-cron-secret
# header compared against the CRON_SECRET env (same pattern as stripe-webhook).
[functions.check-trial-completions]
verify_jwt = false
