<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Zapia ajuda lojistas brasileiros a criar catálogo digital, vender pelo WhatsApp e gerenciar pedidos em um dashboard simples."
    />
    <link rel="canonical" href="https://zapia.app/" />
    <meta name="facebook-domain-verification" content="vho2kwimgbq970idbbfk3efwvjd6sb" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    <title>Zapia Catálogos Digitais</title>
    <script>
      window.dataLayer = window.dataLayer || []
      ;(() => {
        const consentKey = 'zapia_cookie_consent'
        const loadGtm = () => {
          if (window.__gtmLoaded) return
          try {
            if (window.localStorage.getItem(consentKey) !== 'accepted') return
          } catch {
            return
          }
          window.__gtmLoaded = true
          window.dataLayer.push({ 'gtm.start': Date.now(), event: 'gtm.js' })
          const script = document.createElement('script')
          script.async = true
          script.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-TXTFF99H'
          document.head.appendChild(script)
        }
        const schedule = () => {
          try {
            if (window.localStorage.getItem(consentKey) !== 'accepted') return
          } catch {
            return
          }
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadGtm, { timeout: 3500 })
            return
          }
          window.setTimeout(loadGtm, 2500)
        }
        window.addEventListener('load', schedule, { once: true })
        window.addEventListener('zapia:cookie-consent-accepted', schedule)
        ;['pointerdown', 'keydown', 'touchstart'].forEach((eventName) => {
          window.addEventListener(eventName, loadGtm, { once: true, passive: true })
        })
      })()
    </script>
  </head>
  <body style="font-family: 'DM Sans', sans-serif !important;">
    <div id="root">
      <!--
        Static, JS-free shell so the very first paint isn't a blank white
        page while the JS bundle downloads/parses/executes. React replaces
        this the moment it mounts; the <Suspense> fallback in App.tsx
        mirrors the same markup so there's no flash in between.
      -->
      <div class="flex min-h-screen flex-col items-center justify-center gap-3 bg-z-bg">
        <div class="h-9 w-9 animate-spin rounded-full border-[3px] border-z-border border-t-z-green"></div>
        <span class="text-sm font-medium text-z-text-muted">Carregando...</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
